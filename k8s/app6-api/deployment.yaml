apiVersion: apps/v1
kind: Deployment
metadata:
  name: app6-api
  namespace: app6-system
  labels:
    app.kubernetes.io/name: app6-api
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: app6-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: 0 ensures zero-downtime rolling updates
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app6-api
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Spread pods evenly across nodes to avoid a single point of failure
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: app6-api
      containers:
        - name: app6-api
          # Built locally via: docker compose build app6.api
          image: app6-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Load all non-sensitive settings from ConfigMap and secrets from Secret
          envFrom:
            - configMapRef:
                name: app6-api-config
            - secretRef:
                name: app6-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # Liveness probe: confirms process is alive (no dependency checks)
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          # Readiness probe: checks tags "ready" — pod removed from Service if unhealthy
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
