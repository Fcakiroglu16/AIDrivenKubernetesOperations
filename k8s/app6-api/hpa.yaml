apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app6-api
  namespace: app6-system
  labels:
    app.kubernetes.io/name: app6-api
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app6-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale out when average CPU across pods exceeds 70%
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          # Scale out when average memory across pods exceeds 80%
          averageUtilization: 80
