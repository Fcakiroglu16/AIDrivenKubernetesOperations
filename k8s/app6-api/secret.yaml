# IMPORTANT: Replace all placeholder values with real base64-encoded secrets
# before applying to a cluster. Never commit real credentials to source control.
# Encode a value with: echo -n "my-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: app6-api-secret
  namespace: app6-system
  labels:
    app.kubernetes.io/name: app6-api
    app.kubernetes.io/component: secret
type: Opaque
data:
  # No sensitive configuration keys detected in this project.
  # Add secrets here when connection strings or API keys are introduced, e.g.:
  # ConnectionStrings__Default: <base64-encoded-connection-string>
  # ApiKey: <base64-encoded-api-key>
