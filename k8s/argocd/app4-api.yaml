apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: app4-api-project
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "ArgoCD project for the App4.API service"
  sourceRepos:
    - https://github.com/Fcakiroglu16/AIDrivenKubernetesOperations.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: app4-system
    - server: https://kubernetes.default.svc
      namespace: argocd
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler
  orphanedResources:
    warn: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app4-api
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: app4-api-project
  source:
    repoURL: https://github.com/Fcakiroglu16/AIDrivenKubernetesOperations.git
    targetRevision: main
    path: k8s/app4-api
  destination:
    server: https://kubernetes.default.svc
    namespace: app4-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: "5s"
        maxDuration: "3m"
        factor: 2
