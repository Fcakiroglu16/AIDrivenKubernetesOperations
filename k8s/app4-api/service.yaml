apiVersion: v1
kind: Service
metadata:
  name: app4-api
  namespace: app4-system
  labels:
    app.kubernetes.io/name: app4-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app4-api
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
