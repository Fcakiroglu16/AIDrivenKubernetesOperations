apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app4-api
  namespace: app4-system
  labels:
    app.kubernetes.io/name: app4-api
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app4-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
