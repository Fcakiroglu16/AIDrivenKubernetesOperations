apiVersion: v1
kind: Service
metadata:
  name: app-api
  namespace: app-system
  labels:
    app.kubernetes.io/name: app-api
    app.kubernetes.io/component: api
spec:
  # ClusterIP: internal only — expose externally via an Ingress resource
  type: ClusterIP
  selector:
    app.kubernetes.io/name: app-api
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
